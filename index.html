<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#C17F5A">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>옷장 속의 작은 빵집</title>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:'Malgun Gothic','맑은 고딕','Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#FFF8F0;}
:root{
  --f:'Malgun Gothic','맑은 고딕','Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  --p:#C17F5A;--pd:#7A4A2C;--pk:#F4A0B5;--pl:#FDE8EF;
  --bg:#FFF8F0;--cd:#FFFFFF;--tx:#3D2314;--sb:#7A5A4A;--mu:#B09080;
  --bd:#EDD9C8;--gn:#4CAF82;--or:#E8A020;--re:#D94444;--bl:#3B82F6;
}
#app{max-width:430px;min-height:100vh;margin:0 auto;display:flex;flex-direction:column;background:var(--bg);}
#screen{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:env(safe-area-inset-bottom);}
.pg{display:none;padding:20px 16px;}
.pg.on{display:block;animation:fadeIn .2s ease;}
.pg-full{display:none;min-height:100vh;flex-direction:column;align-items:center;justify-content:center;}
.pg-full.on{display:flex;}
#nav{position:sticky;bottom:0;flex-shrink:0;background:var(--cd);border-top:1.5px solid var(--bd);display:none;flex-direction:row;padding-bottom:env(safe-area-inset-bottom);z-index:100;}
.nb{flex:1;background:none;border:none;padding:8px 0 10px;cursor:pointer;font-family:var(--f);color:var(--mu);display:flex;flex-direction:column;align-items:center;gap:2px;}
.nb.on{color:var(--p);}
.ni{font-size:20px;position:relative;line-height:1;}
.nl{font-size:10px;font-weight:500;}
.bdg{position:absolute;top:-3px;right:-8px;background:var(--pk);color:#fff;border-radius:50%;width:14px;height:14px;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;}
.card{background:var(--cd);border-radius:20px;padding:20px;border:1px solid var(--bd);margin-bottom:14px;}
.store-name-big{font-size:22px;font-weight:900;color:var(--pd);white-space:nowrap;letter-spacing:-0.5px;margin:14px 0 4px;}
.ph2{font-size:20px;font-weight:800;color:var(--pd);margin-bottom:4px;}
.ps{font-size:13px;color:var(--mu);margin-bottom:16px;}
.sec-title{font-size:15px;font-weight:800;color:var(--pd);margin-bottom:12px;}
.sub-txt{color:var(--mu);font-size:13px;}
.btn-p{display:block;width:100%;padding:13px 0;border:none;border-radius:24px;background:var(--p);color:#ffffff;font-size:15px;font-weight:800;cursor:pointer;font-family:var(--f);}
.btn-s{display:block;width:100%;padding:12px 0;border:none;border-radius:24px;background:var(--pl);color:var(--p);font-size:15px;font-weight:700;cursor:pointer;font-family:var(--f);}
.btn-dark{display:block;width:100%;padding:13px 0;border:none;border-radius:24px;background:var(--pd);color:#ffffff;font-size:16px;font-weight:800;cursor:pointer;font-family:var(--f);}
.btn-back{background:none;border:none;color:var(--p);font-size:14px;font-family:var(--f);font-weight:600;cursor:pointer;margin-bottom:16px;padding:0;}
.btn-sm{background:var(--p);color:#ffffff;border:none;border-radius:18px;padding:8px 16px;font-weight:700;font-size:13px;cursor:pointer;font-family:var(--f);}
.fld{margin-bottom:14px;}
.fld label{font-size:13px;color:var(--sb);font-weight:600;margin-bottom:5px;display:block;}
.fld input,.fld textarea{border:1.5px solid var(--bd);border-radius:12px;padding:11px 14px;font-size:15px;width:100%;font-family:var(--f);background:#FFF9F5;color:var(--tx);outline:none;}
.fld input:focus,.fld textarea:focus{border-color:var(--p);}
.fld textarea{min-height:90px;resize:vertical;}
.err{color:var(--re);font-size:13px;font-weight:600;margin-bottom:8px;}
.stat{border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700;display:inline-block;}
.s-w{background:#FFF3E0;color:var(--or);}
.s-g{background:#E8F5E9;color:#2E7D32;}
.s-r{background:#FFEBEE;color:var(--re);}
.dstat{border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;display:inline-block;margin-top:4px;}
.d-ing{background:#E3F2FD;color:#1565C0;}
.d-done{background:#E8F5E9;color:#2E7D32;}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.pc{background:var(--cd);border-radius:20px;overflow:hidden;border:1.5px solid transparent;transition:border-color .2s;}
.pc.sel{border-color:var(--pk);}
.pt{width:100%;padding-top:70%;position:relative;background:linear-gradient(135deg,#FFF3E0,#FDE8EF);}
.pt img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;}
.pe{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:36px;}
.pinfo{padding:10px 10px 12px;}
.pn{font-weight:700;font-size:13px;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pp{font-weight:800;font-size:14px;color:var(--p);margin:2px 0 8px;}
.qc{display:flex;align-items:center;justify-content:center;gap:10px;}
.qb{width:28px;height:28px;border-radius:50%;border:none;cursor:pointer;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.qm{background:var(--pl);color:var(--p);}
.qp{background:var(--p);color:#ffffff;}
.qv{font-weight:800;font-size:15px;color:var(--pd);min-width:20px;text-align:center;}
#cart-ft{border-top:1.5px solid var(--bd);background:var(--cd);padding:14px 18px;display:none;}
.total-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.total-lbl{font-size:14px;color:var(--sb);font-weight:600;}
.total-amt{font-size:22px;font-weight:900;color:var(--p);}
.order-card{background:var(--cd);border-radius:20px;padding:18px;border:1px solid var(--bd);margin-bottom:14px;}
.om{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.oi{background:var(--bg);border-radius:12px;padding:12px 14px;margin-bottom:10px;}
.orow{display:flex;justify-content:space-between;font-size:14px;margin-bottom:5px;color:var(--tx);}
.oamt{font-weight:700;color:var(--p);}
.ototrow{display:flex;justify-content:space-between;font-size:15px;font-weight:800;border-top:1px dashed var(--bd);padding-top:10px;margin-top:7px;}
.oact{display:flex;gap:8px;margin-top:8px;}
.obtn{flex:1;border-radius:14px;padding:11px 0;font-weight:700;font-size:13px;cursor:pointer;font-family:var(--f);border:none;}
.bank-box{background:#FFF9E6;border-radius:12px;padding:14px 16px;border:1px solid rgba(232,160,32,.25);margin-bottom:10px;}
.cancel-box{background:#FFEBEE;border-radius:12px;padding:12px 14px;border:1px solid rgba(217,68,68,.2);margin-bottom:10px;}
.delivery-track{background:var(--bg);border-radius:14px;padding:14px 16px;margin-bottom:4px;}
.track-row{display:flex;align-items:flex-start;}
.track-step{display:flex;flex-direction:column;align-items:center;flex:1;}
.track-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;}
.track-dot.done{background:var(--p);color:#fff;}
.track-dot.active{background:var(--bl);color:#fff;box-shadow:0 0 0 3px rgba(59,130,246,.25);}
.track-dot.wait{background:var(--bd);color:var(--mu);}
.track-lbl{font-size:10px;font-weight:600;margin-top:4px;text-align:center;line-height:1.3;}
.track-lbl.done{color:var(--pd);}
.track-lbl.active{color:var(--bl);}
.track-lbl.wait{color:var(--mu);}
.track-line{flex:1;height:2px;margin-top:12px;}
.track-line.done{background:var(--p);}
.track-line.wait{background:var(--bd);}
.pi-item{display:flex;gap:14px;align-items:center;background:var(--cd);border-radius:18px;padding:14px 16px;border:1px solid var(--bd);margin-bottom:12px;}
.pi-th{width:64px;height:64px;border-radius:12px;overflow:hidden;flex-shrink:0;background:linear-gradient(135deg,#FFF3E0,#FDE8EF);display:flex;align-items:center;justify-content:center;font-size:26px;}
.pi-th img{width:100%;height:100%;object-fit:cover;}
.photo-upload-area{border:2px dashed var(--bd);border-radius:16px;cursor:pointer;overflow:hidden;position:relative;background:#FFF9F5;}
.photo-upload-area:hover{border-color:var(--p);}
.photo-upload-area input[type=file]{position:absolute;top:0;left:0;

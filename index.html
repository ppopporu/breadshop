<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:'Malgun Gothic','맑은 고딕','Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#FFF8F0;}
:root{

#app{max-width:430px;min-height:100vh;margin:0 auto;display:flex;flex-direction:column;background:var(--bg);}
#screen{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:env(safe-area-inset-bottom);}
.pg{display:none;padding:20px 16px;}
.pg.on{display:block;animation:fadeIn .2s ease;}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>

<script>
// Firebase 연동 로직
function initFB(cfg) {
  if (!firebase.apps.length) firebase.initializeApp(cfg);
  var db = firebase.firestore();
  window.FB = {
    getDoc: function(c,i){ return db.collection(c).doc(i).get().then(function(s){ return s.exists ? Object.assign({id:s.id}, s.data()) : null; }); },
    setDoc: function(c,i,d){ return db.collection(c).doc(i).set(d); },
    getAll: function(c){ return db.collection(c).get().then(function(s){ return s.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); }); }); },
    del:    function(c,i){ return db.collection(c).doc(i).delete(); },
    upd:    function(c,i,d){ return db.collection(c).doc(i).update(d); }
  };
}

// 앱 기본 상태
var LOCS = ['부곡이웃교회', '꼬르륵'];
var S = { view:'splash', user:null, products:[], orders:[], users:[], adminPw:'admin', bankInfo:{bank:'농협은행', account:'301-0256-7890-11', holder:'빵집주인'}, cart:{}, delivery:'부곡이웃교회' };

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

var DB = {
  load: async function(){
    var r = await Promise.all([FB.getAll('products'), FB.getAll('orders'), FB.getAll('users'), FB.getDoc('config','main')]);
    S.products=r[0]; S.orders=r[1]; S.users=r[2];
    if(r[3]){ S.adminPw=r[3].adminPw||'admin'; S.bankInfo=r[3].bankInfo||S.bankInfo; }
  },
  addProduct: async function(p){ await FB.setDoc('products',p.id,p); S.products.push(p); },
  addUser: async function(u){ await FB.setDoc('users',u.id,u); S.users.push(u); },
  addOrder: async function(o){ await FB.setDoc('orders',o.id,o); S.orders.push(o); },
  updOrder: async function(id,d){ await FB.upd('orders',id,d); S.orders=S.orders.map(function(o){return o.id===id?Object.assign(o,d):o;}); },
  saveConfig: async function(){ return FB.setDoc('config','main',{adminPw:S.adminPw, bankInfo:S.bankInfo}); }
};

  }

  // 2. 고정된 설정값 적용
  var fbConfig = {
    apiKey: "AIzaSyCdJF7gnUWcBqmpUSgBFhhUTDrO6b2goSo",
    authDomain: "breadshop-74ae6.firebaseapp.com",
    projectId: "breadshop-74ae6",
    storageBucket: "breadshop-74ae6.firebasestorage.app",
    messagingSenderId: "133816851316",
    appId: "1:133816851316:web:31e0a53d9fa78ab817ea21",
    measurementId: "G-KMSS6H7TV0"
  };

  try {
    initFB(fbConfig);
    DB.load().then(function(){
      // 스플래시(로고) 1.5초 표시 후 로그인으로 이동

    }).catch(function(e){
      console.error(e);
      showToast('DB 연결 실패. 콘솔을 확인하세요.', 'error');
    });
  } catch(e) {
    showToast('Firebase 초기화 실패', 'error');
  }
}

// 화면 네비게이션
function nav(v){
  S.view=v;
  document.querySelectorAll('.pg,.pg-full').forEach(function(p){ p.classList.remove('on'); });
  var el=document.getElementById('p-'+v); if(el) el.classList.add('on');
  document.getElementById('nav').style.display=(['splash','login','register'].indexOf(v)===-1)?'flex':'none';
  
  if(v==='shop'){ renderShop(); renderCartFt(); }
  if(v==='orders') renderBuyerOrders();
  if(v==='admin-orders') renderAdminOrders();
  if(v==='admin-products') renderProductList();
  if(v==='info') renderInfoBank();
  if(v==='admin-settings') populateBank();
  if(document.getElementById('nav').style.display==='flex') renderNav();
}

function renderNav(){
  var navEl=document.getElementById('nav');
  var isAdmin=S.user && S.user.role==='admin';
  var items=isAdmin
    ?[{v:'admin-orders',i:'📋',l:'주문'},{v:'admin-products',i:'🍞',l:'상품'},{v:'admin-settings',i:'⚙️',l:'설정'},{v:'logout',i:'🚪',l:'로그아웃'}]
    :[{v:'shop',i:'🛒',l:'주문'},{v:'orders',i:'📄',l:'내역'},{v:'info',i:'📍',l:'정보'},{v:'logout',i:'🚪',l:'로그아웃'}];
  navEl.innerHTML=items.map(function(it){
    return '<button class="nb'+(S.view===it.v?' on':'')+'" onclick="'+(it.v==='logout'?'doLogout()':'nav(\''+it.v+'\')')+'"><span class="ni">'+it.i+'</span><span class="nl">'+it.l+'</span></button>';
  }).join('');
}

function doLogin(){
  var id=document.getElementById('li-id').value.trim();
  var pw=document.getElementById('li-pw').value;
  var err=document.getElementById('li-err');
  if(id==='admin' && pw===S.adminPw){ S.user={role:'admin'}; nav('admin-orders'); return; }
  var u=S.users.find(function(u){ return (u.email===id || u.phone===id) && u.password===pw; });
  if(u){ S.user=u; u.role='buyer'; nav('shop'); } else { err.style.display='block'; err.textContent='계정 정보를 확인하세요.'; }
}

function doLogout(){ S.user=null; nav('login'); }

function showToast(m,t){
  var el=document.getElementById('toast'); el.textContent=m; el.style.display='block';
  el.style.background=t==='error'?'#D94444':'#4CAF82';
  setTimeout(function(){el.style.display='none';},3000);
}

function makeLogo(sz){
  return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="#FDE8EF" stroke="#F4A0B5"/><circle cx="50" cy="50" r="40" fill="#FFF5EC"/><rect x="30" y="30" width="40" height="40" rx="5" fill="#9E5C3A"/></svg>';
}
function renderLogos(){
  ['splash-logo','login-logo','reg-logo','info-logo'].forEach(function(id){
    var el=document.getElementById(id); if(el) el.innerHTML=makeLogo(70);
  });
}

function renderShop(){ document.getElementById('shop-grid').innerHTML=S.products.map(p=>'<div class="pc"><div class="pt"><img src="'+(p.photo||'')+'"></div><div class="pinfo"><b>'+esc(p.name)+'</b><p>'+p.price+'원</p><button onclick="setQty(\''+p.id+'\',1)">+</button></div></div>').join(''); }
function renderCartFt(){ document.getElementById('cart-ft').style.display=Object.keys(S.cart).length?'block':'none'; }
function populateBank(){ document.getElementById('bk-bank').value=S.bankInfo.bank; document.getElementById('bk-acc').value=S.bankInfo.account; document.getElementById('bk-holder').value=S.bankInfo.holder; }
function renderInfoBank(){ document.getElementById('info-bank').innerHTML='<b>'+S.bankInfo.bank+'</b><br>'+S.bankInfo.account; }

init();
</script>
</body>
</html>
